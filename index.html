<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Македонски — Vocab Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0f;--surface:#18181b;--surface2:#222226;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0ede8;--text2:#9e9a94;--text3:#5c5956;--accent:#d4a853;--accent2:#8fb87a;--accent3:#7eb5d4;--red:#c96b5a;--radius:10px;--radius-lg:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Spectral',Georgia,serif;min-height:100vh;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(212,168,83,0.04) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(126,181,212,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 1rem 4rem}
header{padding:2.5rem 0 2rem;border-bottom:0.5px solid var(--border);margin-bottom:2rem}
.logo{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:6px}
h1{font-size:2rem;font-weight:300;color:var(--text);letter-spacing:-0.01em}
h1 span{color:var(--accent);font-style:italic}
nav{display:flex;gap:2px;margin-bottom:2rem;background:var(--surface);border-radius:var(--radius);padding:3px;border:0.5px solid var(--border)}
nav button{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;cursor:pointer;border-radius:8px;transition:all 0.15s}
nav button.active{background:var(--surface2);color:var(--text);border:0.5px solid var(--border2)}
nav button:hover:not(.active){color:var(--text)}
.section{display:none;animation:fadeIn 0.2s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-title{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:1rem}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.stat-label{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:300;color:var(--text)}
.pbar-wrap{background:var(--surface2);border-radius:20px;height:3px;overflow:hidden;margin:8px 0 4px}
.pbar{height:100%;border-radius:20px;background:var(--accent);transition:width 0.4s ease}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.15s;letter-spacing:0.04em}
.btn:hover{color:var(--text);border-color:rgba(255,255,255,0.25);background:var(--surface2)}
.btn-accent{border-color:rgba(212,168,83,0.4);color:var(--accent)}
.btn-accent:hover{background:rgba(212,168,83,0.08);border-color:rgba(212,168,83,0.6)}
.btn-green{border-color:rgba(143,184,122,0.4);color:var(--accent2)}
.btn-green:hover{background:rgba(143,184,122,0.08)}
.btn-red{border-color:rgba(201,107,90,0.4);color:var(--red)}
.btn-red:hover{background:rgba(201,107,90,0.08)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem}
.fc-outer{perspective:1000px;margin:1.5rem 0}
.fc-inner{position:relative;min-height:220px;transform-style:preserve-3d;transition:transform 0.45s ease;cursor:pointer}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.fc-back{transform:rotateY(180deg);border-color:rgba(212,168,83,0.25)}
.fc-word{font-size:2.2rem;font-weight:300;letter-spacing:-0.02em;color:var(--text);margin-bottom:6px}
.fc-lat{font-size:13px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.05em;margin-bottom:4px}
.fc-hint{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.08em;margin-top:8px}
.fc-translation{font-size:1.6rem;font-weight:300;font-style:italic;color:var(--accent);margin-bottom:6px}
.fc-lat-back{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.06em;margin-bottom:4px}
.fc-cat{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:0.1em}
.fc-nav{display:flex;align-items:center;justify-content:center;gap:16px}
.fc-counter{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);min-width:60px;text-align:center}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.chip{padding:4px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s;letter-spacing:0.04em}
.chip.active{border-color:rgba(212,168,83,0.5);color:var(--accent);background:rgba(212,168,83,0.06)}
.word-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:14px}
.word-row:last-child{border-bottom:none}
.word-mk{font-size:15px;font-weight:400;color:var(--text);min-width:130px}
.word-lat{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;min-width:100px}
.word-en{color:var(--text2);flex:1;font-style:italic}
.word-check{width:20px;height:20px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.15s}
.word-check.done{background:rgba(143,184,122,0.15);border-color:rgba(143,184,122,0.5)}
.cat-badge{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px;border:0.5px solid var(--border);color:var(--text3);white-space:nowrap;letter-spacing:0.06em}
.daily-word{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.daily-word:last-child{border-bottom:none}
.daily-word.done .word-mk,.daily-word.done .word-en,.daily-word.done .word-lat{opacity:0.4;text-decoration:line-through}
input[type=text],select{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:9px 12px;font-size:14px;font-family:'Spectral',serif;color:var(--text);outline:none;transition:border-color 0.15s}
input[type=text]:focus,select:focus{border-color:rgba(212,168,83,0.4)}
select option{background:var(--surface2)}
::placeholder{color:var(--text3)}
.cat-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.cat-row:last-child{border-bottom:none}
.cat-name{font-family:'DM Mono',monospace;font-size:12px;min-width:160px;letter-spacing:0.04em}
.cat-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);min-width:50px;text-align:right}
.empty{font-size:13px;color:var(--text3);text-align:center;padding:2.5rem 0;font-family:'DM Mono',monospace;letter-spacing:0.06em}
.word-list-wrap{max-height:480px;overflow-y:auto}
.word-list-wrap::-webkit-scrollbar{width:3px}
.word-list-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.score-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(212,168,83,0.08);border:0.5px solid rgba(212,168,83,0.25);color:var(--accent);margin-left:8px}
@media(max-width:520px){.stat-grid{grid-template-columns:repeat(2,1fr)};nav button{font-size:10px;letter-spacing:0};.fc-word{font-size:1.8rem};.word-lat{display:none}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Vocab Trainer</div>
    <h1>Учам <span>македонски</span></h1>
  </header>
  <nav>
    <button class="active" onclick="show('home')">Home</button>
    <button onclick="show('daily')">Daily 10</button>
    <button onclick="show('cards')">Cards</button>
    <button onclick="show('library')">Library</button>
  </nav>

  <!-- HOME -->
  <div id="s-home" class="section active">
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">total words</div><div class="stat-val" id="st-total">0</div></div>
      <div class="stat"><div class="stat-label">learned</div><div class="stat-val" id="st-learned">0</div></div>
      <div class="stat"><div class="stat-label">categories</div><div class="stat-val" id="st-cats">0</div></div>
      <div class="stat"><div class="stat-label">day streak</div><div class="stat-val" id="st-streak">1</div></div>
    </div>
    <div class="card">
      <div class="card-title">Today's progress</div>
      <div style="font-size:13px;color:var(--text2);font-family:'DM Mono',monospace;" id="daily-prog-txt">0 / 10 reviewed</div>
      <div class="pbar-wrap"><div class="pbar" id="daily-pbar" style="width:0%"></div></div>
      <div class="btn-row">
        <button class="btn btn-accent" onclick="show('daily')">Start daily challenge →</button>
        <button class="btn" onclick="show('cards')">Free flashcards</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Progress by category</div>
      <div id="home-cats"></div>
    </div>
  </div>

  <!-- DAILY -->
  <div id="s-daily" class="section">
    <div class="card">
      <div class="card-title">Daily challenge — 10 words</div>
      <div style="font-size:13px;color:var(--text2);font-family:'DM Mono',monospace;margin-bottom:14px;" id="daily-status"></div>
      <div id="daily-list"></div>
      <div class="btn-row" id="daily-new-row" style="display:none">
        <button class="btn btn-accent" onclick="newDaily()">New set →</button>
      </div>
    </div>
  </div>

  <!-- FLASHCARDS -->
  <div id="s-cards" class="section">
    <div class="card" style="padding-bottom:0.75rem">
      <div class="card-title">Filter by category</div>
      <div class="chips" id="fc-chips"></div>
    </div>
    <div class="fc-outer">
      <div class="fc-inner" id="fc-inner" onclick="flip()">
        <div class="fc-face">
          <div class="fc-word" id="fc-word">—</div>
          <div class="fc-lat" id="fc-lat"></div>
          <div class="fc-hint" id="fc-hint">tap to reveal</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-translation" id="fc-trans"></div>
          <div class="fc-lat-back" id="fc-lat-back"></div>
          <div class="fc-cat" id="fc-cat-lbl"></div>
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="display:flex;gap:10px;" id="fc-ans-row">
        <button class="btn btn-red" id="fc-no" onclick="fcAns(false)" style="display:none">✗ didn't know</button>
        <button class="btn btn-green" id="fc-yes" onclick="fcAns(true)" style="display:none">✓ knew it</button>
      </div>
      <div class="fc-nav">
        <button class="btn" onclick="fcPrev()">←</button>
        <span class="fc-counter" id="fc-ctr">0 / 0</span>
        <button class="btn" onclick="fcNext()">→</button>
      </div>
    </div>
  </div>

  <!-- LIBRARY -->
  <div id="s-library" class="section">
    <div class="card">
      <div class="card-title">Browse all 586 words</div>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <input type="text" id="lib-q" placeholder="Search Macedonian or English..." oninput="renderLib()" style="flex:1;min-width:180px">
        <select id="lib-cat" onchange="renderLib()" style="width:auto;min-width:160px;">
          <option value="">All categories</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
        <button class="chip" id="filter-all" onclick="setFilter('all')" style="border-color:rgba(212,168,83,0.5);color:var(--accent)">all</button>
        <button class="chip" onclick="setFilter('unlearned')">unlearned</button>
        <button class="chip" onclick="setFilter('learned')">learned</button>
      </div>
      <div class="word-list-wrap"><div id="lib-list"></div></div>
    </div>
  </div>
</div>

const S_LEARNED = 'mk_learned';
const S_DAILY = 'mk_daily_v2';
const S_STREAK = 'mk_streak';

let learned = new Set();
let dailyWords = [], dailyDone = new Set();
let streak = 1;
let fcDeck = [], fcIdx = 0, fcFlipped = false, fcCat = '';
let libFilter = 'all';

const CAT_COLORS = ['#d4a853','#8fb87a','#7eb5d4','#b87ea0','#c9836b','#7ab8b0','#a0a87e','#c4c4c4','#d4a853','#8fb87a','#7eb5d4','#b87ea0','#c9836b','#7ab8b0','#a0a87e'];

function today(){ return new Date().toISOString().slice(0,10); }

function loadStorage(){
  try{ learned = new Set(JSON.parse(localStorage.getItem(S_LEARNED)||'[]')); }catch(e){}
  try{
    const d = JSON.parse(localStorage.getItem(S_DAILY)||'[]');
    if(d.date===today()){ dailyWords=d.words||[]; dailyDone=new Set(d.done||[]); }
  }catch(e){}
  try{ streak = parseInt(localStorage.getItem(S_STREAK)||'1')||1; }catch(e){}
}

function saveL(){ localStorage.setItem(S_LEARNED, JSON.stringify([...learned])); }
function saveD(){ localStorage.setItem(S_DAILY, JSON.stringify({date:today(),words:dailyWords,done:[...dailyDone]})); }

function cats(){ return [...new Set(ALL_WORDS.map(w=>w.cat).filter(Boolean))]; }
function catColor(cat){ return CAT_COLORS[cats().indexOf(cat)%CAT_COLORS.length]; }

function refresh(){ updateStats(); renderHome(); renderLib(); renderDaily(); renderChips(); buildDeck(); showCard(); }

function updateStats(){
  document.getElementById('st-total').textContent = ALL_WORDS.length;
  document.getElementById('st-learned').textContent = learned.size;
  document.getElementById('st-cats').textContent = cats().length;
  document.getElementById('st-streak').textContent = streak;
  const done = dailyDone.size;
  const total = dailyWords.length||10;
  document.getElementById('daily-prog-txt').textContent = done+' / '+total+' reviewed today';
  document.getElementById('daily-pbar').style.width = Math.round(Math.min(done,total)/total*100)+'%';
}

function renderHome(){
  const allCats = cats();
  document.getElementById('home-cats').innerHTML = allCats.map(cat=>{
    const ws = ALL_WORDS.filter(w=>w.cat===cat);
    const lc = ws.filter(w=>learned.has(w.mk)).length;
    const pct = ws.length ? Math.round(lc/ws.length*100) : 0;
    const col = catColor(cat);
    return '<div class="cat-row"><div class="cat-name" style="color:'+col+'">'+cat+'</div>'+
      '<div style="flex:1"><div class="pbar-wrap" style="margin:0"><div class="pbar" style="width:'+pct+'%;background:'+col+'"></div></div></div>'+
      '<div class="cat-count">'+lc+'/'+ws.length+'</div></div>';
  }).join('');
}

function pickDaily(){
  const pool = ALL_WORDS.filter(w=>!learned.has(w.mk)).sort(()=>Math.random()-0.5);
  const extra = ALL_WORDS.filter(w=>learned.has(w.mk)).sort(()=>Math.random()-0.5);
  const combined = [...pool,...extra];
  dailyWords = combined.slice(0,10).map(w=>w.mk);
  dailyDone = new Set();
  saveD();
}

function newDaily(){ pickDaily(); renderDaily(); updateStats(); }

function renderDaily(){
  if(!dailyWords.length) pickDaily();
  document.getElementById('daily-status').textContent = dailyDone.size+' / '+dailyWords.length+' completed';
  document.getElementById('daily-list').innerHTML = dailyWords.map(mk=>{
    const w = ALL_WORDS.find(x=>x.mk===mk); if(!w) return '';
    const done = dailyDone.has(mk);
    const col = catColor(w.cat);
    return '<div class="daily-word '+(done?'done':'')+'">'+
      '<div class="word-check '+(done?'done':'')+'" onclick="togDay(\''+esc(mk)+'\')">'+
      (done?'<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" fill="none" stroke="#8fb87a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')+
      '</div>'+
      '<div class="word-mk">'+w.mk+'</div>'+
      '<div class="word-lat">'+w.lat+'</div>'+
      '<div class="word-en">'+w.en+'</div>'+
      (w.cat?'<div class="cat-badge" style="border-color:'+col+'40;color:'+col+'">'+w.cat+'</div>':'')+
      '</div>';
  }).join('');
  document.getElementById('daily-new-row').style.display = (dailyDone.size>=dailyWords.length && dailyWords.length>0)?'':' none';
  updateStats();
}

function togDay(mk){
  if(dailyDone.has(mk)) dailyDone.delete(mk); else dailyDone.add(mk);
  saveD(); renderDaily();
}

function renderLib(){
  const q = (document.getElementById('lib-q').value||'').toLowerCase();
  const catF = document.getElementById('lib-cat').value;
  const sel = document.getElementById('lib-cat');
  const prev = sel.value;
  sel.innerHTML = '<option value="">All categories</option>'+cats().map(c=>'<option value="'+c+'" '+(c===prev?'selected':'')+'>'+c+'</option>').join('');
  if(prev) sel.value=prev;
  let filtered = ALL_WORDS.filter(w=>{
    const ms = !q || w.mk.toLowerCase().includes(q)||w.en.toLowerCase().includes(q)||(w.lat||'').toLowerCase().includes(q);
    const mc = !catF || w.cat===catF;
    const mf = libFilter==='all'||(libFilter==='learned'&&learned.has(w.mk))||(libFilter==='unlearned'&&!learned.has(w.mk));
    return ms&&mc&&mf;
  });
  const el = document.getElementById('lib-list');
  if(!filtered.length){el.innerHTML='<div class="empty">No words found.</div>';return;}
  el.innerHTML = filtered.slice(0,100).map(w=>{
    const lrn = learned.has(w.mk);
    const col = catColor(w.cat);
    return '<div class="word-row">'+
      '<div class="word-check '+(lrn?'done':'')+'" onclick="togL(\''+esc(w.mk)+'\')">'+
      (lrn?'<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" fill="none" stroke="#8fb87a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')+
      '</div>'+
      '<div class="word-mk">'+w.mk+'</div>'+
      '<div class="word-lat">'+w.lat+'</div>'+
      '<div class="word-en">'+w.en+'</div>'+
      (w.cat?'<div class="cat-badge" style="border-color:'+col+'40;color:'+col+'">'+w.cat+'</div>':'')+
      '</div>';
  }).join('')+
  (filtered.length>100?'<div style="font-size:11px;color:var(--text3);padding:8px 0;font-family:'DM Mono',monospace;">'+( filtered.length-100)+' more — use search</div>':''  );
}

function setFilter(f){
  libFilter = f;
  document.querySelectorAll('#s-library .chip[onclick]').forEach(b=>{
    b.style.borderColor=''; b.style.color='';
  });
  event.target.style.borderColor='rgba(212,168,83,0.5)';
  event.target.style.color='var(--accent)';
  renderLib();
}

function togL(mk){ if(learned.has(mk)) learned.delete(mk); else learned.add(mk); saveL(); renderLib(); renderHome(); updateStats(); }

function renderChips(){
  const allCats = cats();
  document.getElementById('fc-chips').innerHTML = ['All',...allCats].map(c=>
    '<button class="chip '+(( c==='All'&&!fcCat)||(c===fcCat)?'active':'')+'" onclick="setFcCat(\''+esc(c)+'\')">'+c+'</button>'
  ).join('');
}

function setFcCat(c){ fcCat=c==='All'?'':c; fcIdx=0; fcFlipped=false; renderChips(); buildDeck(); showCard(); }

function buildDeck(){
  fcDeck = (fcCat?ALL_WORDS.filter(w=>w.cat===fcCat):[...ALL_WORDS]).sort(()=>Math.random()-0.5);
}

function showCard(){
  document.getElementById('fc-inner').classList.remove('flipped');
  fcFlipped=false;
  document.getElementById('fc-no').style.display='none';
  document.getElementById('fc-yes').style.display='none';
  if(!fcDeck.length){ document.getElementById('fc-word').textContent='—'; document.getElementById('fc-ctr').textContent='0 / 0'; return; }
  const w=fcDeck[fcIdx];
  document.getElementById('fc-word').textContent=w.mk;
  document.getElementById('fc-lat').textContent=w.lat||'';
  document.getElementById('fc-hint').textContent='tap to reveal translation';
  document.getElementById('fc-trans').textContent=w.en;
  document.getElementById('fc-lat-back').textContent=w.lat||'';
  document.getElementById('fc-cat-lbl').textContent=w.cat||'';
  document.getElementById('fc-ctr').textContent=(fcIdx+1)+' / '+fcDeck.length;
}

function flip(){
  if(!fcDeck.length) return;
  if(!fcFlipped){
    fcFlipped=true;
    document.getElementById('fc-inner').classList.add('flipped');
    document.getElementById('fc-hint').textContent='';
    document.getElementById('fc-no').style.display='';
    document.getElementById('fc-yes').style.display='';
  }
}

function fcAns(knew){
  if(!fcDeck.length) return;
  if(knew){ learned.add(fcDeck[fcIdx].mk); saveL(); updateStats(); renderHome(); }
  fcNext();
}

function fcNext(){ if(!fcDeck.length) return; fcIdx=(fcIdx+1)%fcDeck.length; showCard(); }
function fcPrev(){ if(!fcDeck.length) return; fcIdx=(fcIdx-1+fcDeck.length)%fcDeck.length; showCard(); }

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  const idx=['home','daily','cards','library'].indexOf(id);
  document.querySelectorAll('nav button')[idx].classList.add('active');
  if(id==='cards'){ renderChips(); buildDeck(); showCard(); }
  if(id==='library') renderLib();
  if(id==='home'){ renderHome(); updateStats(); }
  if(id==='daily') renderDaily();
}

function esc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,\"\\'\"); }

loadStorage();
refresh();
</script>
</body>
</html>
